<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h1>Your Cart</h1>

{% if cart_items %}
    {% for item in cart_items %}
        <div>
            <h3>{{ item.name }}</h3>
            <p>Qty: {{ item.qty }}</p>
            <p>Subtotal: {{ item.subtotal }}</p>

            <a href="/add/{{ item.id }}/cart">
                <button>+</button>
            </a>

            <a href="/remove/{{ item.id }}">
                <button>Hapus</button>
            </a>
        </div>
    {% endfor %}

    <h2>Total: {{ total }}</h2>

    <a href="/checkout">
        <button>Checkout</button>
    </a>

{% else %}
    <p>Cart kosong</p>
{% endif %}

</body>
</html>
